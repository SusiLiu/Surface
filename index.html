<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surface V3</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="start">
  <h1 class="title">SURFACE</h1>
  <button onclick="start()">ENTER</button>
</div>

<div id="app" class="hidden">

  <div class="top">
    <h2 id="question"></h2>
  </div>

  <div class="systems">
    <div onmouseenter="hoverSystem('academic')" onclick="openSystem('academic')">Academic</div>
    <div onmouseenter="hoverSystem('life')" onclick="openSystem('life')">Life & Skills</div>
  </div>

  <div id="view"></div>

</div>

<script src="app.js"></script>

</body>
</html>
